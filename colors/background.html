<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="keywords" content="web, html, css, javascript, js, java, python">
    <meta name="description" content="World best web development tutorials">
    <meta name="author" content="IJSE">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Background</title>
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico">
    <link rel="stylesheet" href="../assets/lib/normalize.css">

    <style>
        /*background kiayana property ekata image / color dekama suppor karanwa*/
        /*background kiyana eka dnawanam aniwarenma background-repet / background-size / background-position kiyana 3 anowaren dnna oni*/
        div{
            width: 500px;
            height: 500px;
            border: 10px solid rgb(237, 134, 237);
            background: url(../assets/WhatsApp\ Image\ 2026-03-05\ at\ 12.23.31.jpeg);
            background-repeat: no-repeat; /*repeat wena eka nawaththanna*/
            background-size: cover; /*full size karanna div eke ganata*/
            background-position: center; /*madata karanna center karanna*/

            opacity: 80%;  /*winiwida pena gathiya*/

            filter: opacity(50%); /*mehema dnnath puluwan*/
            filter: grayscale(100%);  /*black and white wage dnna puluwan meken*/
            filter: brightness(100%); /*brigtness wadi karanna*/
        }
    </style>
</head>
<body>
    <div></div>
</body>
</html>
