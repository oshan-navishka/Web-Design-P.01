<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="keywords" content="web, html, css, javascript, js, java, python">
    <meta name="description" content="World best web development tutorials">
    <meta name="author" content="IJSE">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Colors</title>
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico">
    <link rel="stylesheet" href="../assets/lib/normalize.css">

    <style>
        /*Color name!*/
        h1{
            color: blue;  /* me widihatath dnna ouluwan color ekak*/
        }
        /*Hex Color code!*/
        h2{
            color :#1c1ab8  /*me widihatath color ekak dnna puluwan */
        }
        /*RGB Colors*/
        h3{
            color:rgb(31, 20, 226)  /*me wididhatah colors dnna puluwan apita*/
        }
        /*RGBA Color*/
        h4{
            color:rgba(31, 20, 226, 0.5) /*mehema dennath puluwan habai a kiyana kenta denna oni value eka 0-1 athara wenna oni*/
        }
        /*mix color ekak use karanne mehama*/
        #d1{
            width: 100px;
            height: 100px;
            margin-bottom: 10px;
            background:linear-gradient(to right, red, blue)
        }

        /*to bottom*/
        #d2{
            width: 200px;
            height: 200px;
            margin-bottom: 10px;
            background:linear-gradient(to bottom, yellow, green )
        }

        /*to right*/
        #d3{
            width: 300px;
            height: 300px;
            margin-bottom: 10px;
            background:linear-gradient(to right, rgb(195, 1, 244), blue, red )
        }

        /*to top left*/
        #d4{
            width: 300px;
            height: 300px;
            margin-bottom: 10px;
            background:linear-gradient(to top left, rgb(131, 244, 1), rgb(20, 157, 82), rgb(159, 51, 51) )
        }

        /*to bottom left*/
        #d5{
            width: 300px;
            height: 300px;
            margin-bottom: 10px;
            background:linear-gradient(to bottom left, rgb(194, 248, 1), rgb(14, 14, 210), rgb(43, 255, 0) )
        }

        /*anshaka wlin dennath puluwam (deg)*/
        #d6{
            width: 300px;
            height: 300px;
            margin-bottom: 10px;
            background:linear-gradient(120deg, red, blue)
        }

        /*mada circle ekak wage widihdena*/
        #d7{
            width: 300px;
            height: 300px;
            margin-bottom: 10px;
            background:radial-gradient(yellow, red, blue)
        }

        /*COLORZILLA WEBSITE EKE THIYANWA AWASHYA WIDIHATA HADAGANNA APITA ONI COLOURS USE KARALA*/
        
        
    </style>
</head>

<body>
    <h1>Hello World!</h1>
    <h2>Hello World!</h2>
    <h3>Hello World!</h3>
    <h4>Hello World!</h4>

    <div id="d1"></div>
    <div id="d2"></div>
    <div id="d3"></div>
    <div id="d4"></div>
    <div id="d5"></div>
    <div id="d6"></div>
    <div id="d7"></div>
</body>
</html>
