<!DOCTYPE html>
<html lang="en">

<head>

    <meta name="keywords" content="web, html, css, javascript, js, java, python">

    <title>Arrays Methods</title>
    <link rel="icon" type="image/x-icon" href="../../assets/favicon.ico">
    <link rel="stylesheet" href="../../assets/lib/normalize.css">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

</head>
<body>
    <script> 
       
       let x = ["Mahinda", "Ranil", "Sajith", "Gotabaya", "Anura"];

       // 01. push() method - add an item to the end of the array
       x.push("Puthanoo");
       console.log(x);          //  ['Mahinda', 'Ranil', 'Sajith', 'Gotabaya', 'Anura', 'Puthanoo']

         // 02. pop() method - remove the last item from the array
       x.pop();
       console.log(x);  // ['Mahinda', 'Ranil', 'Sajith', 'Gotabaya', 'Anura']

         // 03. shift() method - remove the first item from the array
       x.shift();
       console.log(x);     //  ['Ranil', 'Sajith', 'Gotabaya', 'Anura']

        // 04. unshift() method - add an item to the beginning of the array
       x.unshift("Nimal");
       console.log(x);    //   ['Nimal', 'Ranil', 'Sajith', 'Gotabaya', 'Anura']

       // eka para dennekwa add karannath puluwan
       x.unshift("Namalbaby" , "Yoshithababy");
       console.log(x);      // ['Namalbaby', 'Yoshithababy', 'Nimal', 'Ranil', 'Sajith', 'Gotabaya', 'Anura']

       // array dekak ekata ekathu karana vidiha 
       let a = [1,2,3];
       let b = [4,5,6,7,8,9];
       let result = a.concat(b)
       console.log("Result1 :", result);       // [1, 2, 3, 4, 5, 6, 7, 8, 9]

       //mulin dena name eke array eka thama mulin ganne
       let result2 = b.concat(a);
       console.log("Result2 :", result2);    // [4, 5, 6, 7, 8, 9, 1, 2, 3]

       // arrays dekata wadiya ekathu karanne (merge) karanne mehema
        let result3 = a.concat(b,x);
        console.log("Result3 :", result3);    // [1, 2, 3, 4, 5, 6, 7, 8, 9, 'Namalbaby', 'Yoshithababy', 'Nimal', 'Ranil', 'Sajith', 'Gotabaya', 'Anura']

    </script>
</body>
</html>
