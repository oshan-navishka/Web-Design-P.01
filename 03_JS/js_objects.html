<body>
    <script>
        function Student(name, age, grade) {  // constructor kenek hduwa
            this.name = name;
            this.age = age;
            this.grade = grade;
        }

       let p = new Student('Oshan', 22, 'A');   //  darta ekak add kara

       console.log(p);   // data okkoma console eke ganna
       console.log(p.name);  // name eka console eke ganna

       p.name = 'Navishka';   // name eka update karanna
       console.log(p.name);
    </script>
</body>
