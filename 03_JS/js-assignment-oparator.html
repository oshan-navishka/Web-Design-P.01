<body>
    <script>

        var a = 6;
        var b = 2;

        // Assignment (=): Assign a value to a variables
        var c = a;

        // Addition assignment (+=)
        a += b;  // a = a + b

        // Substraction assignmnet (-=)
        a -= b;  // a = a - b

        // multification assignmnet (*=)
        a *= b;  // a = a * b

        // Devide assignmnet (/=)
        a /= b;  // a = a / b

        // Modulo assignmnet (%=)
        a %= b;  // a = a % b

    </script>
</body>
