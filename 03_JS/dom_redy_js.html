<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM Ready</title>
</head>
<body>
    <script src="../assets/lib/jquery-4.0.0.min.js"></script>
    <script>
        $(document).ready(function(){
            console.log("DOM is ready!");  // this code will run when the DOM is fully loaded
        });

        $(function(){
            console.log("DOM is ready!");  // this is a shorter version of the above code
        });
    </script>
</body>
</html>
