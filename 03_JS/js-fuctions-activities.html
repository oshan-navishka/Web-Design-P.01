    <script> 
    //Case 01:    
     function oddOrEven(num){
        if(num % 2 == 0){
            console.log(num + " is Even number");
        }else{
            console.log(num + " is  odd number");
        }
     }

     oddOrEven(10);
     oddOrEven(11);

     console.log("-------------");


        //Case 02:  
        const findOddOrEven = function(num){
            if(num % 2 == 0){
                console.log(num + " is Even number");
            }else{
                console.log(num + " is  odd number");
            }
        }

        findOddOrEven(10);
        findOddOrEven(11);

        console.log("-------------");

        // case 03:
        const oddOrEvenNum = (num) => {
            if(num % 2 == 0){
                console.log(num + " is Even number");
            }else{
                console.log(num + " is  odd number");
            }
        }

        oddOrEvenNum(10);
        oddOrEvenNum(11);

        console.log("-------------");

        //case 04:
        const Factorial = function(num){
            let result = 1;
            for(let i=1; i<=num; i++){
                result *= i;
            }
            return result;
        }

        console.log(Factorial(5)); 

        console.log("-------------");

        // case 05:
        const factorial = (num) => { 
            let result = 1;
            for(let i=1; i<=num; i++){
                result *= i;
            }
            return result;
        }

        console.log(factorial(5));
    </script>
