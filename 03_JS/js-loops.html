<body>
    <script>    
        //========= for loop =========

        for(let i = 1; i <= 10; i++){
            console.log("Result: " + i)
        }
        console.log("================");


         //========= While loop =========

        let i = 1;

        while ( i <= 10) {
            console.log("Result: " + i);
            i++;
        }
        console.log("===============")

        //========= While loop =========
        let a = 1;

        do {
            console.log("Result: " + a);
            a++;
        } while (a <= 10);
       
    </script>
</body>
