    <script>

        /*
            IN JAVA
          ===========

          int x = 10;

        */

        /*loosely typed eke time to time wenas wenawa data type eka assing karanna string d numberda booleadnd e oni ekak 
        assign kre gaman meya e type eka eyage kragananwa*/

        var x = 10;  //number
        console.log(x)
        console.log(typeof x);  // type eka cheack kraama therenawa
        
        x = "Navi";  //string
        console.log(x)
        console.log(typeof x);  /// string

        x = true;  //boolean
        console.log(x)
        console.log(typeof x);   // boolean

    </script>
