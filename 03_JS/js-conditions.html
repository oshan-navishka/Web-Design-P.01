        var marks = 75;

        if (marks >= 0 && marks <= 35) {
            console.log("F");
        } else if (marks > 35 && marks <= 45) {
            console.log("S");
        } else if (marks > 45 && marks <= 55) {
            console.log("C");
        } else if (marks > 55 && marks <= 65) {
            console.log("B");
