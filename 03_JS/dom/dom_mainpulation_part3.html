<body>
    
    <h1 id="topic">Welcome to JavaScript!</h1>
    <div id="div1"><h3>Welcome</h3>to India</div>

    <script>

        var element = document.getElementById("topic");
        var txt = element.innerText;
        console.log(txt);       // Welcome to JavaScript!

        var div_element = document.getElementById("div1");
        element.innerText = "Habibi Welcome to Sri Lanka!";  // change the text of the element
        console.log(div_element.innerText);  
        console.log(div_element.innerHTML);

        div_element.innerText = "Habibi welcome to <i> Sri Lanaka. </i>";  // change the text of the element
        div_element.innerHTML = "Habibi welcome to <i> Sri Lanaka. </i>";  // change the text of the element
        

    </script>
    
</body>
