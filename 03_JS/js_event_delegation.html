<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="keywords" content="web, html, css, javascript, js, java, python">
    <meta name="description" content="World best web development tutorials">
    <meta name="author" content="IJSE">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>js_Event_Delegation</title>
    <link rel="icon" type="image/x-icon" href="../assets/favicon.ico">
    <link rel="stylesheet" href="../assets/lib/normalize.css">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

</head>
<body>
    <button>Click!</button>

    <ol>
        <li>Java</li>
        <li>Python</li>
        <li>JavaScript</li>
    </ol>

    <script src="../assets/lib/jquery-4.0.0.min.js"></script>

    <script>
        $('button').click(function() {
            console.log('button clicked');   // button eka clisk karama button clicked kiyala watenwa consol eke
        });

        $('ol').click(function() {
            console.log('ol clicked');   // list eke item ekak clickkarama ol clicked kiyala console eke watenwa
        });

        $('button').on('click', function() {
            let new_list = $('<li>ABC</li>');     // item ekak click karama comsol eke alith li ekak create wenwa ABC kiyala
            $('ol').append(new_list);
        });

        $('ol').on('click', 'li', function() {      // item ekath ekkama click une mkkd balaganna eka
            console.log($(this).text() + ' clicked');   // index eka oni nm text eka nathuwa list eke console.log($(this).index() + ' clicked'); 
            //console.log($(this).index());
        });

        $('ol').on('click', 'li', function(){
            console.log($(this).data('index') + ' clicked');   // data-index eka oni nm text eka nathuwa list eke console.log($(this).data('index') + ' clicked');
        });

        let i = 4;
        $('button').on('click', function(){
            let new_list = <li data-index="${}">i</li>;
            $('ol').append(new_list);
        })

    </script>
</body>
</html>
