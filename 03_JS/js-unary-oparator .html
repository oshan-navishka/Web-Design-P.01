    <script>
        // Unary plus (+): Convert the operand into a number
        var a = "10";
        console.log(a + 2);  //102
        console.log(+a + 2);  // 12    issrahata + mark eka dmmama string type ekeen dila thiyana numbere ekata eka convert wela calculation wenawa
        console.log("===========");

        // Unary minus (-): Negetes the operand
        var b = 10;
        console.log(b); //10
        console.log(-b);  // -10  issrahata - mark eke dmmama dila thiyana positive gane negetive eka enawa
        console.log("===========");

        // Increment (++): Increases the value of a variable by 1
        var x = 10;
        console.log(x);  // 10
        x ++ ;
        console.log(x);  // 11    thiyenne 10 ekata 1k increament wenwa 10 ++ -> 11
        console.log("===========");

        //Decrement (--): Decreases the value of a variable by 1
        console.log(x);  // 11
        x --; 
        console.log(x); //10 thiyenne 11 ekata 1k decrement wenawa 11 --  -> 10
        console.log("===========");


        // case 01

        var y1 = 2;
        var r1 = 10 + y1++;
        console.log("r1: ", r1); //12

    </script>
