<body>

    <h1 id="topic">0</h1>
    <button id="stop_btn">Stop</button>

    
    <script>
        var num = 0;
        var h1_element = document.getElementById("topic");
        var stop_btn = document.getElementById("stop_btn");
        //setTimeout(), setInterval()

        setTimeout(() => {
            console.log("Timeout!!!");
        }, 8000);

        setInterval(() => {
            num+=1;
            h1_element.textContent = num;
        }, 1000);

    </script>
