<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="keywords" content="web, html, css, javascript, js, java, python">
    <meta name="description" content="World best web development tutorials">
    <meta name="Oshan-Navishka" content="IJSE">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Course Management</title>
    <link rel="icon" type="image/x-icon" href="../assets/favicon.ico">
    <link rel="stylesheet" href="../assets/lib/normalize.css">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <style>
        .tabless {
            margin-left: 500px;
            margin-top: 50px;
        }

        .form-name {
            justify-content: center;
            text-align: center;
            margin-top: 50px;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <header>
        <nav class="navbar navbar-expand-lg bg-primary">
            <div class="container-fluid">
                <a class="navbar-brand" href="#">IJSE</a>
            </div>
        </nav>
    </header>
    <main>
        <aside class="position-fixed top-0 bottom-0 margin-auto w-25 bg-primary-subtle">
            <ul class="nav flex-column">
                <li class="nav-item">
                    <a class="nav-link active" aria-current="page" href="#">Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="student.html">Students</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="course.html">Courses</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#">Instructors</a>
                </li>
            </ul>
        </aside>
    </main>

    <h1 class="form-name">Course</h1>

    <section class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-12 col-md-8 col-lg-6">
                <form class="border rounded p-3 bg-light">
                    <div class="mb-3">
                        <label for="studentId" class="form-label">Student ID</label>
                        <input type="text" class="form-control" id="studentId" placeholder="Enter Student ID">
                    </div>

                    <div class="mb-3">
                        <label for="courseName" class="form-label">Course Name</label>
                        <input type="text" class="form-control" id="courseName" placeholder="Enter Course Name">
                    </div>

                    <div class="mb-3">
                        <label for="courseCode" class="form-label">Code</label>
                        <input type="text" class="form-control" id="courseCode" placeholder="Enter Code">
                    </div>

                    <div class="mb-3">
                        <label for="courseDuration" class="form-label">Duration</label>
                        <input type="text" class="form-control" id="courseDuration" placeholder="Enter Duration">
                    </div>

                    <div class="mb-3">
                        <label for="courseDescription" class="form-label">Description</label>
                        <textarea class="form-control" id="courseDescription" rows="3" placeholder="Enter Description"></textarea>
                    </div>

                    <div class="text-end">
                        <button type="button" class="btn btn-save" style="background-color: green;">Save</button>
                        <button type="button" class="btn btn-update" style="background-color: blue;">Update</button>
                        <button type="button" class="btn btn-delete" style="background-color: red;">Delete</button>
                        <button type="reset" class="btn btn-outline-secondary ms-2" style="background-color: aqua; color: black;">Reset</button>
                    </div>
                    
                </form>
            </div>
        </div>
    </section>
    <section class="tabless">
        <table class="table table-striped">
            <thead>
                <tr>
                    <th>Student ID</th>
                    <th>Course Name</th>
                    <th>Code</th>
                    <th>Duration</th>
                    <th>Description</th>
                </tr>
            </thead>
            <tbody id="courseTableBody">
                <tr>
                    <td>1</td>
                    <td>Mathematics</td>
                    <td>MATH101</td>
                    <td>12 weeks</td>
                    <td>Introductory mathematics course</td>
                </tr>
                <tr>
                    <td>2</td>
                    <td>Physics</td>
                    <td>PHYS101</td>
                    <td>12 weeks</td>
                    <td>Basic physics principles</td>
                </tr>
                <tr>
                    <td>3</td>
                    <td>Chemistry</td>
                    <td>CHEM101</td>
                    <td>12 weeks</td>
                    <td>Introduction to chemistry</td>
                </tr>
            </tbody>
        </table>
    </section>

    <script src="../assets/lib/jquery-4.0.0.min.js"></script>

    <script>
        const courseCodeRegex = /^[A-Za-z]{2,6}[0-9]{2,4}$/;

        $('.btn-save').on('click', function () {
            const studentId = $('#studentId').val().trim();
            const courseName = $('#courseName').val().trim();
            const courseCode = $('#courseCode').val().trim();
            const courseDuration = $('#courseDuration').val().trim();
            const courseDescription = $('#courseDescription').val().trim();

            if (studentId === '') {
                alert('Student ID is required');
                return;
            }
            if (courseName === '') {
                alert('Course Name is required');
                return;
            }
            if (!courseCodeRegex.test(courseCode)) {
                alert('Invalid Course Code (e.g., CS101)');
                return;
            }
            if (courseDuration === '') {
                alert('Duration is required');
                return;
            }
            if (courseDescription === '') {
                alert('Description is required');
                return;
            }

            const newRow = `
                <tr>
                    <td>${studentId}</td>
                    <td>${courseName}</td>
                    <td>${courseCode}</td>
                    <td>${courseDuration}</td>
                    <td>${courseDescription}</td>
                </tr>
            `;

            $('#courseTableBody').append(newRow);
            alert('Course added successfully!');

            $('#studentId').val('');
            $('#courseName').val('');
            $('#courseCode').val('');
            $('#courseDuration').val('');
            $('#courseDescription').val('');
        });
    </script>
</body>
</html>
