<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="keywords" content="web, html, css, javascript, js, java, python">
    <meta name="description" content="World best web development tutorials">
    <meta name="Oshan-Navishka" content="IJSE">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Course Management</title>
    <link rel="icon" type="image/x-icon" href="../assets/favicon.ico">
    <link rel="stylesheet" href="../assets/lib/normalize.css">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <style>
        .tabless {
            margin-left: 500px;
            margin-top: 50px;
        }

        .form-name {
            justify-content: center;
            text-align: center;
            margin-top: 50px;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <header>
        <nav class="navbar navbar-expand-lg bg-primary">
            <div class="container-fluid">
                <a class="navbar-brand" href="#">IJSE</a>
            </div>
        </nav>
    </header>
    <main>
        <aside class="position-fixed top-0 bottom-0 margin-auto w-25 bg-primary-subtle">
            <ul class="nav flex-column">
                <li class="nav-item">
                    <a class="nav-link active" aria-current="page" href="#">Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="student.html">Students</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="course.html">Courses</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#">Instructors</a>
                </li>
            </ul>
        </aside>
    </main>

    <h1 class="form-name">Course</h1>

    <section class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-12 col-md-8 col-lg-6">
                <form class="border rounded p-3 bg-light">
                    <div class="mb-3">
                        <label for="courseId" class="form-label">Course ID</label>
                        <input type="text" class="form-control" id="courseId" placeholder="Enter Course ID">
                    </div>

                    <div class="mb-3">
                        <label for="courseName" class="form-label">Course Name</label>
                        <input type="text" class="form-control" id="courseName" placeholder="Enter Course Name">
                    </div>

                    <div class="mb-3">
                        <label for="courseCode" class="form-label">Code</label>
                        <input type="text" class="form-control" id="courseCode" placeholder="Enter Code">
                    </div>

                    <div class="mb-3">
                        <label for="courseDuration" class="form-label">Duration</label>
                        <input type="text" class="form-control" id="courseDuration" placeholder="Enter Duration">
                    </div>

                    <div class="mb-3">
                        <label for="courseDescription" class="form-label">Description</label>
                        <textarea class="form-control" id="courseDescription" rows="3" placeholder="Enter Description"></textarea>
                    </div>

                    <div class="text-end">
                        <button type="button" class="btn btn-save" style="background-color: green; color: white;">Save</button>
                        <button type="button" class="btn btn-update" style="background-color: blue; color: white;">Update</button>
                        <button type="button" class="btn btn-delete" style="background-color: red; color: white;">Delete</button>
                        <button type="reset" id="btnReset" class="btn btn-outline-secondary ms-2" style="background-color: aqua; color: black;">Reset</button>
                    </div>
                    
                </form>
            </div>
        </div>
    </section>
    <section class="tabless">
        <table class="table table-striped">
            <thead>
                <tr>
                    <th>Course ID</th>
                    <th>Course Name</th>
                    <th>Code</th>
                    <th>Duration</th>
                    <th>Description</th>
                </tr>
            </thead>
            <tbody id="courseTableBody"></tbody>
        </table>
    </section>

    <script src="../assets/lib/jquery-4.0.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <script src="controller/courseController.js"></script>
    <script src="controller/sidebarController.js"></script>
</body>
</html>
