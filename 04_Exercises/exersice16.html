<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="keywords" content="web, html, css, javascript, js, java, python">
    <meta name="description" content="World best web development tutorials">
    <meta name="author" content="IJSE">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Media-Query</title>
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico">
    <link rel="stylesheet" href="../assets/lib/normalize.css">

    <style>
        section{
            width: 100vw;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
        }

        div{
            height: 500px;
            border: 5px solid red;
            background-image: url(../assets/images.png);
            background-repeat: no-repeat;
            background-position: center;
            background-size: cover;

        }

        @media (max-width: 1300px) {
            section {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (max-width: 1000px) {
            section {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 800px) {
            section {
                grid-template-columns: repeat(1, 1fr);
            }
        }
    </style>
</head>
<body>
    <section>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
    </section>
</body>
</html>
