<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        body {
            background-color: black;
        }
        section {
            justify-content: center;
            align-items: center;
            display: flex;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;

        }
        section div {
            width: 80px;
            height: 80px;
            background-color: rgb(0, 0, 0);
            border: 2px solid rgb(255, 0, 0);
        }

        section div:nth-child(1) {
            background-color: white;
        }
        section div:nth-child(2) {
            background-color: rgb(224, 114, 114);
        }
        section div:nth-child(3) {
            background-color: rgb(234, 56, 56);
        }
        section div:nth-child(4) {
            background-color: rgb(225, 30, 30);
        }
        section div:nth-child(5) {
            background-color: rgb(255, 0, 0);
            box-shadow: 0 2px 10px 5px rgb(255, 0, 0);
        }
    </style>
</head>
<body>
    <section>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        
    </section>

    <script src="../assets/lib/jquery-4.0.0.min.js"></script>
    <script>
        const divs = document.querySelectorAll("section div");

        let index = 0;
        let direction = 1;

        setInterval(() => {

            divs.forEach(div => {
                div.style.backgroundColor = "black";
                div.style.boxShadow = "none";
            });

            divs[index].style.backgroundColor = "red";
            divs[index].style.boxShadow = "0 0 20px red";

            for (let i = 1; i <= 4; i++) {
                let pos = index - (i * direction);

                if (divs[pos]) {
                    if (i === 1) divs[pos].style.backgroundColor = "rgb(225, 30, 30)";
                    if (i === 2) divs[pos].style.backgroundColor = "rgb(234, 56, 56)";
                    if (i === 3) divs[pos].style.backgroundColor = "rgb(224, 114, 114)";
                    if (i === 4) divs[pos].style.backgroundColor = "white";
                }
            }

            index += direction;

            if (index === divs.length - 1 || index === 0) {
                direction *= -1;
            }

        }, 60);
    </script>

    
</body>
</html>
