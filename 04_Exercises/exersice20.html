<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="keywords" content="web, html, css, javascript, js, java, python">
    <meta name="description" content="World best web development tutorials">
    <meta name="author" content="IJSE">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Animation</title>
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico">
    <link rel="stylesheet" href="../assets/lib/normalize.css">

    <style>
        section{
            width: 1000px;
            height: 600px;
            border: 5px solid lawngreen;
            overflow: hidden;
        }
        div{
            position: relative;
            width: 300px;
            height: 100px;
            border-top-left-radius: 20px ;
            border-top-right-radius: 20px ;
            border-radius: 20px ;

            background: rgb(140, 0, 255);
            

            animation: move 8s linear infinite;
            
        }

        @keyframes move{
    0%{
        background: red;
        margin-left: 0;
        margin-top: 0;
        transform: rotate(180deg);
    }
    25%{
        background: yellow;
        margin-left: 700px;
        margin-top: 0;
        
    }
    50%{
        background: blue;
        margin-left: 700px;
        margin-top: 500px;
        
    }
    75%{
        background: green;
        margin-left: 0;
        margin-top: 500px;
        
    }
    100%{
        background: red;
        margin-left: 0;
        margin-top: 0;
       
    }
}
    </style>
</head>
<body>
    <section>
        <div></div>
    </section>
    
</body>
</html>
