<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="keywords" content="web, html, css, javascript, js, java, python">
    <meta name="description" content="World best web development tutorials">
    <meta name="author" content="IJSE">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Overflow</title>
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico">
    <link rel="stylesheet" href="../assets/lib/normalize.css">

    <style>
        body{
            overflow-x: hidden; /*pahalata cscrol wenawa digatama pink color eka*/
            /* overflow-y: hidden; */
            
        }
        section{
            width: 300px;
            height: 300px;
            border: 5px solid black;   /*overflow dmmama wenne div eke podi kotuwe ara wagema scroll karala balanna puluwan */
            /*overflow: scroll;*/
        }
        section>div:first-child{
            width: 3000px;
            height: 80px;
            background-color: orange;
        }
        section>div:nth-child(2){
            width: 80px;
            height: 3000px;
            background-color: deeppink;
        }
    </style>
</head>
<body>
    <section>
        <div></div>
        <div></div>
    </section>
</body>
</html>
