<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="keywords" content="web, html, css, javascript, js, java, python">
    <meta name="description" content="World best web development tutorials">
    <meta name="author" content="IJSE">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Animation</title>
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico">
    <link rel="stylesheet" href="../assets/lib/normalize.css">

    <style>
        section{
            width: 1000px;
            height: 600px;
            border: 5px solid lawngreen;
        }
        div{
            position: relative;
            width: 100px;
            aspect-ratio: 1/1;
            background: rgb(140, 0, 255);

            animation: move 8s linear infinite;
            
        }

        @keyframes move{
            0%{
                margin-left: 0;
                margin-top: 0;
            }
            25%{
                margin-left: 900px;
                margin-top: 0;
            }
            50%{
                margin-left: 900px;
                margin-top: 500px;
            }
            75%{
                margin-left: 0;
                margin-top: 500px;
            }
        }
    </style>
</head>
<body>
    <section>
        <div></div>
    </section>
    
</body>
</html>
